# Demo profile: H2 in-memory database for quick testing (no external DB needed)
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.h2.console.enabled=true

# Logging
logging.level.root=WARN
logging.level.com.henryqi=DEBUG
logging.level.org.springframework.data.jdbc=DEBUG
logging.level.org.h2.jdbc=DEBUG
logging.level.org.springframework.jdbc.core=DEBUG
logging.level.org.springframework.jdbc.core.JdbcTemplate=DEBUG
logging.level.org.springframework.data.jdbc.core.JdbcAggregateOperations=DEBUG

# Use the same pool settings as production
spring.datasource.hikari.maximum-pool-size=30
spring.datasource.hikari.minimum-idle=10
spring.datasource.hikari.connection-timeout=3000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# Server and other settings
server.port=${PORT:3000}
spring.jackson.property-naming-strategy=SNAKE_CASE
server.compression.enabled=true
server.compression.mime-types=application/json,application/xml,text/html,text/xml,text/plain
server.compression.min-response-size=1024
spring.threads.virtual.enabled=true

management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=always

elevenlabs.api.key=${ELEVENLABS_API_KEY:}
anthropic.api.key=${ANTHROPIC_API_KEY:}
