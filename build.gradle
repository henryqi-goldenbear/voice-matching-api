/*
 * This file was generated by the Gradle 'init' task.
 *
 * This project uses @Incubating APIs which are subject to change.
 */

plugins {
    id 'java-library'
    id 'maven-publish'
}

repositories {
    mavenLocal()
    maven {
        url = uri('https://repo.maven.apache.org/maven2/')
    }
}

dependencies {
    api libs.org.springframework.boot.spring.boot.starter.web
    api libs.org.springframework.boot.spring.boot.starter.data.jdbc
    api libs.org.springframework.boot.spring.boot.starter.actuator
    api libs.org.projectlombok.lombok
    api libs.com.fasterxml.jackson.core.jackson.databind
    api libs.io.micrometer.micrometer.registry.prometheus
    runtimeOnly libs.org.postgresql.postgresql
    testImplementation libs.org.openjdk.jmh.jmh.core
    testImplementation libs.org.openjdk.jmh.jmh.generator.annprocess
    testImplementation libs.org.springframework.boot.spring.boot.starter.test
}

group = 'com.voicematch'
version = '0.0.1-SNAPSHOT'
description = 'voice-matching-api'
java.sourceCompatibility = JavaVersion.VERSION_11

publishing {
    publications {
        maven(MavenPublication) {
            from(components.java)
        }
    }
}

tasks.withType(JavaCompile) {
    options.encoding = 'UTF-8'
}

tasks.withType(Javadoc) {
    options.encoding = 'UTF-8'
}

test {
    // Some environments include benchmarks or have no discovered unit tests;
    // avoid failing the build when no tests are found.
    failOnNoDiscoveredTests = false
}
